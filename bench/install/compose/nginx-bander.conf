# Serve the bandersnatch static mirror tree (banderx-style). Pure nginx sendfile
# zero-copy — "the static-file ceiling", framed as such in results, not as
# bandersnatch app speed. gzip ON for the index (banderx ships it off, which
# would inflate index bytes for no reason); range requests are nginx default.

server {
    listen 8080;
    server_name _;
    root /data/pypi/web;

    gzip on;
    gzip_min_length 1000;
    gzip_types text/html application/vnd.pypi.simple.v1+json application/json;

    location / {
        autoindex off;
        try_files $uri $uri/index.html =404;
    }
}
