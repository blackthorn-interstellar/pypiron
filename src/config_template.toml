# pypiron.toml — server and mirror configuration.
#
# Generated by `pypiron config init`. Every line below is commented out and
# shows its default, so an untouched file changes nothing: pypiron already runs
# with sensible defaults. Uncomment a line to override it. pypiron auto-loads
# ./pypiron.toml; elsewhere, point at it with --config PATH.
#
# Precedence: CLI flags / env vars  >  this file  >  built-in defaults.
# Every key also has a --flag and a PYPIRON_* env var. Full reference:
# https://pypiron.com/reference/configuration/
#
# Secrets are never read from this file, so it is safe to commit: the admin,
# uploader, and read passwords, the token signing key, and the Azure access key
# come only from the CLI or the environment.

# Reserve a private namespace: names equal to `<prefix>` or starting `<prefix>-`
# are yours alone and never fall through to an upstream (a dependency-confusion
# guard). Shared by `sync` and the `serve` proxy.
# private-prefix = "acme"


[serve]  # the server process — `pypiron serve`

# Address to listen on.
# bind-addr = "0.0.0.0:8080"

# Storage — where artifacts live. Truth is files; there is no database.
# Backend: disk | s3 | gcs | azure. disk is the zero-dependency default; the
# cloud backends need the matching bucket/account keys below.
# storage = "disk"
# data-dir = "~/.pypiron/packages"          # disk: root folder

# S3, or any S3-compatible store such as MinIO. Region comes from AWS_REGION;
# credentials from the standard AWS chain. The bucket must already exist.
# s3-bucket = "my-bucket"
# aws-region = "us-east-1"
# s3-endpoint-url = "http://localhost:9000"   # point at an S3-compatible endpoint
# s3-force-path-style = false

# Google Cloud Storage. A service-account key enables presigned redirects;
# under Application Default Credentials (no key) downloads stream instead.
# gcs-bucket = "my-bucket"
# gcs-service-account-path = "/path/to/key.json"
# gcs-endpoint-url = "http://localhost:4443"    # point at a local emulator

# Azure Blob Storage. The account access key (--azure-access-key / AZURE_*)
# stays in the CLI/env and is what enables presigned (SAS) redirects.
# azure-account = "myaccount"
# azure-container = "packages"
# azure-endpoint-url = "http://127.0.0.1:10000/devstoreaccount1"
# azure-use-emulator = false

# Proxy — serve unknown (non-private) packages on demand from this upstream,
# verifying and caching each artifact on first request. Scope what it will serve
# with the [mirror] table below.
# proxy-upstream = "https://pypi.org"

# How artifact bytes reach clients: auto | redirect | stream. auto redirects
# cache-immune clients (uv) to presigned URLs and streams the rest; redirect
# always 302s so this node never touches bytes; stream always proxies them.
# artifact-delivery = "auto"

# Publishing / CI. Wait for an upload to appear in the index before returning
# 200, so a publish-then-install pipeline is deterministic.
# wait-on-upload = false
# wait-on-upload-secs = 10
# Upload spool directory. Point at real disk where /tmp is a RAM-backed tmpfs,
# or multi-GB wheels spool into memory.
# spool-dir = "/var/spool/pypiron"

# Logging. By default only mutations (uploads, deletes, yanks) are logged; turn
# this on to log every request — the full access log.
# access-log = false
# access-log-format = "structured"          # structured | clf

# Download statistics (beta) — count per-package/version downloads per day.
# About $0.04 per node per month, no database.
# download-stats = true
# counters-resolution = "1d"                # bucket width: 1d | 1h | 30m | 2h
# counters-flush-interval-secs = 300        # how often each node flushes (the main cost knob)
# counters-rollup-interval-secs = 3600      # how often finished days are compacted
# counters-retention-days = 90

# Worker and multi-node tuning — the defaults are right for most deployments.
# worker-interval-secs = 1                  # cadence for noticing peer nodes' writes
# intent-grace-secs = 900                   # grace before a stalled upload's rebuild proceeds
# audit-on-boot = true                      # self-heal sweep when a node becomes leader
# reconcile-interval-secs = 86400           # audit sweep interval (an unchanged corpus is ~free)
# lease-ttl-secs = 30                       # leader lease TTL (multi-node S3)


[mirror]  # the slice of PyPI to mirror/proxy — shared by `sync` and the serve proxy

# Names to include. `sync` mirrors exactly these; the proxy serves only these
# (fail-closed) when set. Each entry is a name with optional PEP 440 specifiers.
# include-packages = ["requests>=2.20,<3", "numpy"]
# include-packages-from = "packages.txt"    # one spec per line; resolves next to this file

# Names to subtract from the include set. A bare name drops the whole project;
# a specifier drops only matching versions.
# exclude-packages = ["legacy-insecure", "demo<2"]
# exclude-packages-from = "denied.txt"

# File filters — all optional; unset means "keep everything".
# include-format = ["wheel", "sdist"]       # wheel | sdist | other
# include-python-tag = ["cp311", "cp312"]
# include-abi-tag = ["cp311", "abi3"]
# include-platform-tag = ["manylinux*", "any"]
# exclude-python-tag = ["pp*"]              # e.g. drop PyPy wheels
# exclude-abi-tag = ["pypy*"]
# exclude-platform-tag = ["win*", "macosx_*"]   # drop Windows and macOS wheels
# exclude-python-below = "3.9"              # drop wheels built only for older Pythons
# exclude-dev = false                       # drop .devN releases
# exclude-prereleases = false               # drop alpha/beta/rc/dev releases
# exclude-windows = false                   # drop .exe/.msi and Windows wheels
# exclude-larger = "250MB"                  # drop artifacts larger than this
# include-yanked = false                    # yanked files are dropped by default

# Supply-chain cooldown: keep only files first seen upstream before this cutoff.
# Defaults to "7" — a sliding 7-day quarantine so a freshly published (and
# quickly yanked) release is held back. Accepts a timestamp, a date, a day
# count, or a duration ("30 days"). Set "" to mirror right up to now.
# exclude-newer = "7"
# exclude-older = "2020-01-01"              # keep only files at or after this cutoff


[sync]  # the push-mirror job — `pypiron sync`

# Destination pypiron server (required for sync — here or via --to). The
# [mirror] table above decides WHAT gets mirrored.
# to = "http://localhost:8080"
# from = "https://pypi.org"                 # source PEP 691 index
# Destination admin credential (mirroring is admin-only). Prefer supplying the
# password via PYPIRON_SYNC_ADMIN_PASS over committing it here.
# admin-user = "admin"
# admin-pass = "secret"                     # better: set PYPIRON_SYNC_ADMIN_PASS
# concurrency = 4                           # parallel transfers within one package
# package-concurrency = 8                   # packages synced in parallel
