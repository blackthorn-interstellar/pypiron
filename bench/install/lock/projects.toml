# Corpus of well-known open-source Python projects whose dependency closures
# drive the realistic install benchmark (see dev/BENCHMARK_INSTALL.md).
#
# This file is the curated INPUT (loose names + realistic extras). The frozen
# OUTPUT — exact versions, wheel URLs, sizes, hashes — lives in the generated
# `closures/*.txt` and `wheelhouse.*.json` next to it, produced by `freeze.py`.
# Each project is resolved INDEPENDENTLY (its own transitive closure), so the
# wheelhouse is naturally multi-version, like a real index. Re-freeze only on an
# explicit, committed bump.

[meta]
# uv resolves each closure constrained to this environment so the wheelhouse is
# a finite, glibc-linux/x86_64 set (the loadgen runtime).
environments = ["sys_platform == 'linux' and platform_machine == 'x86_64'"]
target_pythons = ["3.11", "3.12"]
# Wheel tags the benchmark client will actually request (wheelhouse filter).
platform_tags = ["manylinux", "any"]

