name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Clippy (fail on warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Unit tests
        run: cargo test --workspace --all-features --locked

  integration:
    name: blackbox integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Sync dev dependencies
        run: uv sync
      # The product's center of gravity is the blackbox suite (dev/TESTING.md):
      # the real binary driven over HTTP by real uv/pip clients. S3/MinIO tests
      # skip without Docker; the multi-client compat matrix (poetry/pdm/flit/
      # hatch via uvx) stays a local `make compat` concern, not a merge gate.
      - name: Blackbox suite (disk mode)
        run: uv run -- pytest tests -m "not perf and not stress and not compat"

  python-lint:
    name: python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - name: Sync dev dependencies
        run: uv sync
      - name: Ruff lint and format check
        run: |
          uv run -- ruff check tests bench scripts
          uv run -- ruff format --check tests bench scripts

  fuzz-build:
    name: fuzz build (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-fuzz
      # Keep the fuzz targets compiling. Coverage-guided runs stay manual
      # (`make fuzz`); this only guards against bitrot in the harness.
      - name: Compile all fuzz targets
        # Pin the gnu host target: recent cargo-fuzz defaults to musl even on a
        # gnu host, and musl's static libc is incompatible with ASan.
        # https://github.com/rust-fuzz/cargo-fuzz/issues/398
        run: cargo fuzz build --target x86_64-unknown-linux-gnu

  # Wheel builds run only for release tags (and manual dispatch for testing the
  # pipeline). The version is stamped from the tag; the repo itself stays at 0.0.0.
  # One job, one matrix over every (kind, runner, target). maturin-action treats an
  # unset manylinux as auto and ignores it off Linux, and the aarch64-gnu CFLAGS is a
  # no-op elsewhere, so the steps are identical for every platform. fail-fast is off
  # so one platform's failure doesn't cancel the rest (these were independent jobs).
  wheels:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    name: wheels (${{ matrix.kind }}, ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # `triple` is the Rust target the wheel embeds; it names the standalone
          # binary archive pulled from that same wheel (see "Archive ..." below).
          - { kind: linux,     runner: ubuntu-22.04,   target: x86_64,  triple: x86_64-unknown-linux-gnu }
          - { kind: linux,     runner: ubuntu-22.04,   target: x86,     triple: i686-unknown-linux-gnu }
          # --zig: these cross arches default to the manylinux2014 image, whose old
          # GCC can't compile mimalloc v3's C. Build them with zig (the same toolchain
          # the Docker image already cross-compiles all 8 arches with) instead.
          - { kind: linux,     runner: ubuntu-22.04,   target: aarch64, triple: aarch64-unknown-linux-gnu, zig: "--zig" }
          - { kind: linux,     runner: ubuntu-22.04,   target: armv7,   triple: armv7-unknown-linux-gnueabihf, zig: "--zig" }
          - { kind: linux,     runner: ubuntu-22.04,   target: s390x,   triple: s390x-unknown-linux-gnu, zig: "--zig" }
          - { kind: linux,     runner: ubuntu-22.04,   target: ppc64le, triple: powerpc64le-unknown-linux-gnu, zig: "--zig" }
          - { kind: linux,     runner: ubuntu-22.04,   target: riscv64, triple: riscv64gc-unknown-linux-gnu }
          - { kind: musllinux, runner: ubuntu-22.04,   target: x86_64,  triple: x86_64-unknown-linux-musl,  manylinux: musllinux_1_2 }
          - { kind: musllinux, runner: ubuntu-22.04,   target: x86,     triple: i686-unknown-linux-musl,    manylinux: musllinux_1_2 }
          - { kind: musllinux, runner: ubuntu-22.04,   target: aarch64, triple: aarch64-unknown-linux-musl, manylinux: musllinux_1_2 }
          - { kind: musllinux, runner: ubuntu-22.04,   target: armv7,   triple: armv7-unknown-linux-musleabihf, manylinux: musllinux_1_2 }
          - { kind: windows,   runner: windows-latest, target: x64,     triple: x86_64-pc-windows-msvc }
          - { kind: windows,   runner: windows-latest, target: x86,     triple: i686-pc-windows-msvc }
          - { kind: windows,   runner: windows-latest, target: aarch64, triple: aarch64-pc-windows-msvc }
          # GitHub retired the macos-13 (Intel) image on 2025-12-04; macos-15-intel
          # is its standard x86_64 replacement (last Intel image, supported to ~2027-08).
          - { kind: macos,     runner: macos-15-intel, target: x86_64,  triple: x86_64-apple-darwin }
          - { kind: macos,     runner: macos-14,       target: aarch64, triple: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: ./.github/stamp-version.sh "$GITHUB_REF_NAME"
      # Make the README baked into the wheel/sdist metadata render on PyPI:
      # rewrite its repo-relative links/logo to absolute URLs (pinned to the
      # stamped tag). The committed file stays GitHub-relative.
      - name: Rewrite README links to absolute URLs for PyPI
        shell: bash
        run: command -v python3 >/dev/null 2>&1 && python3 scripts/transform_readme.py --target pypi || python scripts/transform_readme.py --target pypi
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.target }}
          args: --release --locked ${{ matrix.zig }} --out dist
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
        env:
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-${{ matrix.kind }}-${{ matrix.target }}
          path: dist
      # Re-wrap the compiled binary already inside the wheel as a standalone
      # archive — the GitHub-Release download for this target. No second compile.
      - name: Archive standalone binary
        shell: bash
        run: |
          command -v python3 >/dev/null 2>&1 && PY=python3 || PY=python
          "$PY" scripts/archive_binary.py --dist dist --triple "${{ matrix.triple }}" --out binaries
      - name: Upload standalone binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.kind }}-${{ matrix.target }}
          path: binaries
          if-no-files-found: error

  sdist:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: ./.github/stamp-version.sh "$GITHUB_REF_NAME"
      # Make the README baked into the wheel/sdist metadata render on PyPI:
      # rewrite its repo-relative links/logo to absolute URLs (pinned to the
      # stamped tag). The committed file stays GitHub-relative.
      - name: Rewrite README links to absolute URLs for PyPI
        shell: bash
        run: command -v python3 >/dev/null 2>&1 && python3 scripts/transform_readme.py --target pypi || python scripts/transform_readme.py --target pypi
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [fmt, clippy, test, wheels, sdist]
    permissions:
      # Used for PyPI trusted publishing and to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      # Build-provenance attestation is a public-repo-only feature; skip it while
      # the repo is private (it reactivates automatically once the repo is public).
      - name: Generate artifact attestation
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: 'dist/*'
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  # ARMv6 (Raspberry Pi 1 / Zero) has no musllinux wheel, so it isn't in the
  # `wheels` matrix and gets no extracted binary. Cross-compile the static musl
  # binary directly (cargo-zigbuild, no QEMU — same path the container build uses)
  # and hand it to `release-binaries` as a `binaries-*` artifact so it lands on
  # the GitHub Release with everything else.
  binary-armv6:
    name: binary (armv6)
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TRIPLE: arm-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: ./.github/stamp-version.sh "$GITHUB_REF_NAME"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: arm-unknown-linux-musleabihf
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: armv6
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-zigbuild
      - name: Install zig
        run: python3 -m pip install --user --break-system-packages ziglang
      - name: Cross-compile (static musl, ARMv6 hard-float)
        run: cargo zigbuild --release --locked --target "$TRIPLE"
      - name: Archive standalone binary
        run: |
          mkdir -p binaries
          tar -C "target/$TRIPLE/release" -czf "binaries/pypiron-$TRIPLE.tar.gz" pypiron
      - name: Upload standalone binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-armv6
          path: binaries
          if-no-files-found: error

  # Standalone binaries → GitHub Release. The per-target binaries were already
  # pulled from the wheels (the `wheels` job), so this just collects them, writes
  # a checksum manifest, attests them, and attaches them to the tag's Release.
  # PyPI wheels stay separate (the `release` job above); the GHCR image is its
  # own workflow (docker.yml).
  release-binaries:
    name: Release binaries (GitHub)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [fmt, clippy, test, wheels, binary-armv6]
    permissions:
      contents: write       # create the Release and upload assets
      id-token: write       # provenance attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: binaries-*
          merge-multiple: true
          path: binaries
      - name: Generate checksums
        working-directory: binaries
        run: sha256sum pypiron-* > SHA256SUMS
      # Build-provenance attestation is a public-repo-only feature; skip it while
      # the repo is private (it reactivates automatically once the repo is public).
      - name: Generate artifact attestation
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: 'binaries/pypiron-*'
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes binaries/* \
          || gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber binaries/*
