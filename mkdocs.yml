site_name: pypiron
site_description: An ultra-fast Python package server, written in Rust.
site_author: Blackthorn Interstellar
site_url: https://pypiron.com/
copyright: Copyright &copy; 2025 Blackthorn Interstellar

repo_url: https://github.com/blackthorn-interstellar/pypiron
repo_name: blackthorn-interstellar/pypiron
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/pypiron-logo-256.png
  favicon: assets/pypiron-logo-256.png
  features:
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    # Built-in default (light) / slate (dark) schemes, recolored to the iron &
    # rust palette in stylesheets/pypiron.css. Building on slate means we inherit
    # its complete, dark-correct variable set (shadows, code highlighting,
    # admonition/table colors) instead of re-deriving it by hand.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/pypiron.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Guides:
      - Deploy: guides/deploy.md
      - Air-gapped mirror: guides/air-gapped-mirror.md
  - Features:
      - Storage backends: concepts/storage.md
      - Authentication: concepts/authentication.md
      - Mirroring: concepts/mirroring.md
      - Supply-chain defense: concepts/supply-chain.md
      - Artifact delivery: concepts/artifact-delivery.md
      - Download statistics: concepts/download-stats.md
  - Reference:
      - How it works: concepts/how-it-works.md
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Management API: reference/api.md
      - Client compatibility: reference/compatibility.md
      - Standards support: reference/standards.md
      - Benchmarks: reference/benchmarks.md
