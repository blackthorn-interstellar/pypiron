# Template for pypicloud Track 2 (S3 + DynamoDB). bench.py renders this into
# pypicloud-config-dynamo.gen.ini, substituting __BUCKET__ / __REGION__ from the
# rig env, and the overlay mounts the .gen.ini. AWS-only.

[app:main]
use = egg:pypicloud

pyramid.reload_templates = false
pyramid.default_locale_name = en

pypi.fallback = cache
pypi.default_read = everyone
pypi.default_write = everyone
pypi.cache_update = everyone

# S3 blob storage + DynamoDB metadata cache (pypicloud's cloud-native combo).
pypi.storage = s3
storage.bucket = __BUCKET__
storage.region_name = __REGION__
storage.prefix = ibench/

pypi.db = dynamo
db.region_name = __REGION__
db.namespace = pypiron-ibench-
db.graceful_reload = true

pypi.auth = config
session.encrypt_key = bench
session.validate_key = bench
session.secure = false

[uwsgi]
paste = config:%p
paste-logger = %p
master = true
uid = pypicloud
gid = pypicloud
processes = 4
enable-threads = true
max-requests = 0
http = 0.0.0.0:8080

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(asctime)s [%(name)s] %(message)s
