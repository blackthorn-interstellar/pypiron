# devpi-gen-config (role=standalone) output, adapted for the bench: listen 8080
# and proxy to the `devpi` service. The /+f/ direct static serving is the
# documented prod path and the fairness requirement (bare devpi would stream
# every wheel byte through Python). gzip includes the PEP 691 JSON simple type.

map $http_x_forwarded_proto $x_scheme {
    default $scheme;
    http http;
    https https;
}

server {
    server_name localhost $hostname "";
    listen 8080;
    gzip             on;
    gzip_min_length  2000;
    gzip_proxied     any;
    gzip_types  text/plain text/css text/xml
                application/json application/vnd.pypi.simple.v1+json
                application/javascript text/javascript
                application/xml application/xml+rss;

    proxy_read_timeout 60s;
    client_max_body_size 64M;

    # devpi-server state on the shared (read-only) volume.
    root /devpi/server;

    # serve cached wheels directly off disk (zero-copy), proxy the rest.
    location ~ /\+f/ {
        error_page 418 = @proxy_to_app;
        if ($request_method !~ (GET)|(HEAD)) {
            return 418;
        }
        expires max;
        try_files /+files$uri @proxy_to_app;
    }

    location / {
        error_page 418 = @proxy_to_app;
        return 418;
    }

    location @proxy_to_app {
        proxy_pass http://devpi:3141;
        proxy_set_header X-Forwarded-Proto $x_scheme;
        proxy_set_header X-outside-url $x_scheme://$http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
