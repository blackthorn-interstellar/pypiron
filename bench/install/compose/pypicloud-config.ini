[app:main]
use = egg:pypicloud

pyramid.reload_templates = false
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en

# Serve installs from the LOCAL cache. The default fallback is `redirect` (302 to
# the pythonhosted CDN), which would measure upstream, not pypicloud. Warm once,
# then every measured install is a local read. docs/BENCHMARK_INSTALL.md §3.
pypi.fallback = cache
pypi.default_read = everyone
pypi.default_write = everyone
# In cache mode, fetching an uncached package from upstream needs cache_update,
# which defaults to `authenticated` — grant it to everyone so anonymous warm
# installs populate the cache (otherwise /simple/<pkg>/ 401s on a miss).
pypi.cache_update = everyone

# Track 1: file blob storage + SQL metadata cache on Postgres (NOT sqlite, which
# has write-lock contention during warm). Track 2 swaps these for s3 + dynamo.
pypi.storage = file
storage.dir = /var/lib/pypicloud/packages
pypi.db = sql
db.url = postgresql://pypicloud:pypicloud@postgres/pypicloud
pypi.auth = config

session.encrypt_key = bench
session.validate_key = bench
session.secure = false

[uwsgi]
paste = config:%p
paste-logger = %p
master = true
uid = pypicloud
gid = pypicloud
processes = 4
enable-threads = true
max-requests = 0
http = 0.0.0.0:8080

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(asctime)s [%(name)s] %(message)s
