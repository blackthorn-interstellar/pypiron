name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:

jobs:
  # Linux builds
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # Workaround for ring 0.17 aarch64 assembler detection in manylinux cross builds
          CFLAGS_aarch64_unknown_linux_gnu: -D__ARM_ARCH=8
          RING_PREGENERATE_ASM: '1'
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      
      - name: Test wheel
        if: matrix.target == 'x86_64'
        run: |
          pip install dist/*.whl
          pypiron --help
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # macOS builds
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: 'true'
      
      - name: Test wheel
        if: (matrix.target == 'aarch64' && runner.arch == 'ARM64') || (matrix.target == 'x86_64' && runner.arch == 'X64')
        run: |
          pip install dist/*.whl
          pypiron --help
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  # Windows builds
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist --find-interpreter
          sccache: 'true'
      
      - name: Test wheel
        if: matrix.target == 'x64'
        run: |
          pip install dist/*.whl
          pypiron --help
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  # Publish to PyPI (only on tags)
  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, macos, windows]
    environment:
      name: pypi
      url: https://pypi.org/p/pypiron
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

